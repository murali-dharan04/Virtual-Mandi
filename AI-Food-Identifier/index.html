<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Food Identifier — Virtual Mandi</title>
  <meta name="description"
    content="Upload a photo to instantly detect and identify food items using advanced AI vision technology.">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Particle animation canvas -->
  <canvas id="particle-canvas"></canvas>

  <div class="container">
    <header>
      <h1><span class="ai-icon">🧠</span> AI Food Identifier</h1>
      <p class="subtitle">Upload a photo to detect food instantly</p>
      <div class="powered-badge">
        <span class="dot"></span>
        Vision AI Powered
      </div>
    </header>

    <main>
      <div class="upload-section">
        <label for="file-upload" id="dropzone">
          <span class="upload-icon">📸</span>
          <span class="drop-text"><strong>Click to upload</strong> or drag and drop</span>
          <p class="hint-text">PNG or JPG • Max 10MB</p>
          <input type="file" id="file-upload" accept="image/*" hidden>
        </label>

        <div id="image-preview-container">
          <img id="image-preview" src="" alt="Preview">
        </div>
      </div>

      <div id="loading" class="loading">
        <div class="spinner-container">
          <div class="spinner-glow"></div>
          <div class="spinner"></div>
        </div>
        <p><span class="scan-text">Analyzing with Vision AI...</span></p>
      </div>

      <div id="error-msg" class="error-msg"></div>

      <div id="results" class="results-section">
        <div class="result-card">
          <div class="result-header">
            <span class="badge" id="method-badge">AI Analysis</span>
          </div>
          <div class="result-row">
            <div>
              <span class="label">Detected Food</span>
              <p id="food-name" class="value">-</p>
            </div>
            <div class="text-right">
              <span class="label">Category</span>
              <p id="food-category" class="value">-</p>
            </div>
          </div>

          <div id="quality-section" class="quality-grid" style="display: none;">
            <!-- Dynamic quality metrics -->
          </div>

          <div class="result-row" style="margin-bottom: 0;">
            <div style="width: 100%;">
              <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <span class="label">AI Confidence</span>
                <span id="confidence-score"
                  style="font-weight: 800; font-size: 1.1rem; color: var(--primary);">0%</span>
              </div>
              <div class="confidence-bar">
                <div id="confidence-fill" class="confidence-fill"></div>
              </div>
            </div>
          </div>
        </div>

        <div id="low-confidence-warning" class="error-msg warning-msg" style="margin-top: 1.5rem;">
          Unable to confidently detect food. Please try another image or correct it below.
        </div>

        <div class="manual-fix" id="manual-fix-section">
          <p class="label" style="margin-bottom: 0.5rem;">Manual Correction</p>
          <input type="text" id="manual-name" placeholder="Enter correct food name">
          <button id="reset-btn" class="btn-ghost">Start Over</button>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
